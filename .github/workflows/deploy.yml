name: Build & deploy site

# Copy this file into your CONTENT repo at .github/workflows/deploy.yml.
#
# It builds your site with the Timber generator and deploys it to GitHub Pages on
# every push to main (plus manual runs and a daily rebuild). `main` holds source
# only — the built HTML never enters git; it's uploaded as a Pages artifact and
# deployed directly (no gh-pages branch). See SPEC §12.
#
# It also co-hosts the in-browser editor at /<repo>/admin/ on the same Pages site,
# once you've run the "Setup OAuth broker" workflow (which records the broker URL in
# .timber-broker-url). Until then, only the public site is published.
#
# One-time setup in your content repo:
#   1. Settings → Pages → Source: "GitHub Actions".
#   2. Pin TIMBER_REF below to a Timber release tag so preview ≡ production.
#   3. Run "Setup OAuth broker" to enable the /admin/ editor (see README).

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    - cron: '0 4 * * *' # daily rebuild (SPEC §15)

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  TIMBER_REPO: TimAidley/Timber
  TIMBER_REF: main # pin to a Timber release tag

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this content repo
        uses: actions/checkout@v4

      - name: Check out Timber (pinned)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TIMBER_REPO }}
          ref: ${{ env.TIMBER_REF }}
          path: .timber

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: .timber/pnpm-lock.yaml

      - name: Install Timber deps
        working-directory: .timber
        run: pnpm install --frozen-lockfile

      - name: Build the Timber CLI (generator)
        working-directory: .timber
        run: pnpm --filter "@timber/cli..." build

      - name: Build the site
        run: node .timber/packages/cli/dist/index.js build . _site

      # Co-host the editor at /<repo>/admin/ — only once the broker is configured.
      # The Setup workflow commits .timber-broker-url; without it we ship the site
      # alone (so the site works before you wire up OAuth).
      - name: Build the editor (/admin/)
        run: |
          if [ ! -f .timber-broker-url ]; then
            echo "No .timber-broker-url yet — run the 'Setup OAuth broker' workflow to enable /admin/. Shipping the site only."
            exit 0
          fi
          REPO='${{ github.event.repository.name }}'
          export TIMBER_BASE="/$REPO/admin/"
          export VITE_TIMBER_OWNER='${{ github.repository_owner }}'
          export VITE_TIMBER_REPO="$REPO"
          export VITE_TIMBER_OAUTH_CLIENT_ID='${{ vars.GH_OAUTH_CLIENT_ID }}'
          VITE_TIMBER_OAUTH_BROKER_URL="$(cat .timber-broker-url)"
          export VITE_TIMBER_OAUTH_BROKER_URL
          # Sign-in flow: leave the TIMBER_OAUTH_FLOW repo variable unset for the default
          # redirect flow, or set it to 'device' for the device flow (no client secret).
          export VITE_TIMBER_OAUTH_FLOW='${{ vars.TIMBER_OAUTH_FLOW }}'
          ( cd .timber && pnpm --filter "@timber/app..." build )
          mkdir -p _site/admin
          cp -r .timber/packages/app/dist/. _site/admin/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
